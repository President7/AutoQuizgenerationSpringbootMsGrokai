spring.application.name=config-server
server.port=9094

#server-config on class path
#spring.cloud.config.server.native.search-locations=classpath:/config
#spring.profiles.active=native

#server-config on github
spring.cloud.config.server.git.uri=https://github.com/President7/microsevice-springboot-ordr-inventory-notifications
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.clone-on-start=true

#eureka client config
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

management.endpoints.web.exposure.include=*

#rabbit mq configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

#encrypt key
encrypt.key="1234567765sdfghr3456765edfgh123456uhjkjhgfdsf23456tre"